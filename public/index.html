<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENA - Gestión de Ambientes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">

    <header class="bg-white border-b border-gray-200 py-3 mb-4 sticky top-0 z-40 shadow-sm">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-[#39A900] rounded-xl flex items-center justify-center shadow-lg">
                    <span class="text-white font-bold text-xl">S</span>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-gray-800 leading-tight">Gestión de Aulas</h1>
                    <p class="text-[10px] text-gray-400 font-bold uppercase">SENA Centro de Formación</p>
                </div>
            </div>
            <div class="text-right hidden sm:block">
                <p class="text-xs font-bold text-gray-700 uppercase">Coordinación Académica</p>
                <p class="text-[10px] text-[#39A900] font-bold">Reserva de Ambientes</p>
            </div>
        </div>
    </header>

    <main class="w-full max-w-7xl mx-auto px-2 md:px-6 pb-10">
        <div class="bg-white rounded-2xl shadow-xl p-2 md:p-4 border border-gray-100 overflow-hidden">
            <div id="calendar"></div>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[9999]">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl transition-all scale-100">
            <h2 id="modalDateTitle" class="text-xl font-bold mb-6 text-center border-b pb-2 text-gray-800"></h2>
            <form id="reservaForm" class="space-y-4">
                <input type="hidden" id="fechaInput">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Responsable</label>
                    <input type="text" id="nombre" placeholder="Nombre del Instructor" required 
                        class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-[#39A900] transition-colors">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Inicio</label>
                        <input type="time" id="inicio" required class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-[#39A900]">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Fin</label>
                        <input type="time" id="fin" required class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-[#39A900]">
                    </div>
                </div>
                
                <div class="flex flex-col gap-3 pt-6">
                    <div class="flex gap-2 justify-end w-full">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 text-gray-400 font-bold hover:bg-gray-50 rounded-xl transition-all">Cancelar</button>
                        <button type="submit" class="bg-[#39A900] hover:bg-[#2d8500] text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-all active:scale-95">
                            Guardar
                        </button>
                    </div>
                    <button type="button" id="btnEliminar" onclick="eliminarReserva()" 
                        class="hidden w-full text-red-500 font-bold text-sm py-3 rounded-xl border border-red-50 hover:bg-red-100 transition-all">
                        🗑 Eliminar Reserva
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
