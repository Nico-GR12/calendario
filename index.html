<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENA - Gestión de Ambientes</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect fill='%2339A900' width='40' height='40'/%3E%3Ctext x='50%25' y='50%25' font-size='24' font-weight='bold' fill='white' text-anchor='middle' dy='.3em'%3ES%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">

    <header class="bg-white border-b border-gray-200 py-3 mb-4 sticky top-0 z-40 shadow-sm">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-[#39A900] rounded-xl flex items-center justify-center shadow-lg">
                    <span class="text-white font-bold text-xl">S</span>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-gray-800 leading-tight">Gestión de Aulas</h1>
                    <p class="text-[10px] text-gray-400 font-bold uppercase">SENA Centro de Formación</p>
                </div>
            </div>
            <div class="text-right hidden sm:block">
                <p class="text-xs font-bold text-gray-700 uppercase">Coordinación Académica</p>
                <p class="text-[10px] text-[#39A900] font-bold">Reserva de Ambientes</p>
            </div>
        </div>
    </header>

    <main class="w-full max-w-7xl mx-auto px-2 md:px-6 pb-10">
        <div class="bg-white rounded-2xl shadow-xl p-2 md:p-4 border border-gray-100 overflow-hidden">
            <div id="calendar"></div>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[9999]">
        <div class="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden">
            <div class="relative bg-gradient-to-r from-[#39A900] to-[#2d8500] px-6 py-5 text-white">
                <button type="button" onclick="closeModal()" class="absolute top-3 right-4 text-white/80 hover:text-white text-2xl leading-none transition-all hover:scale-110">&times;</button>
                <h2 id="modalDateTitle" class="text-lg font-bold"></h2>
            </div>
            <form id="reservaForm" class="p-6 space-y-4">
                <input type="hidden" id="fechaInput">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1.5 ml-1">
                        <span class="inline-block mr-1">📅</span> Nombre del Evento
                    </label>
                    <input type="text" id="nombre" placeholder="Evento" required
                        class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-[#39A900] focus:bg-green-50/30 transition-all">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1.5 ml-1">
                            <span class="inline-block mr-1">🕐</span> Inicio
                        </label>
                        <input type="time" id="inicio" required
                            class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-[#39A900] focus:bg-green-50/30 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1.5 ml-1">
                            <span class="inline-block mr-1">🕑</span> Fin
                        </label>
                        <input type="time" id="fin" required
                            class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-[#39A900] focus:bg-green-50/30 transition-all">
                    </div>
                </div>
                
                <div class="flex flex-col gap-3 pt-4">
                    <button type="submit"
                        class="w-full bg-gradient-to-r from-[#39A900] to-[#2d8500] hover:from-[#2d8500] hover:to-[#1f6b00] text-white py-3.5 rounded-xl font-bold shadow-lg transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                        💾 Guardar Reserva
                    </button>
                    <button type="button" onclick="closeModal()"
                        class="w-full text-gray-400 font-semibold text-sm py-3 rounded-xl hover:bg-gray-50 transition-all">
                        Cancelar
                    </button>
                    <button type="button" id="btnEliminar" onclick="eliminarReserva()"
                        class="hidden w-full text-red-500 font-bold text-sm py-3 rounded-xl border border-red-100 hover:bg-red-50 transition-all">
                        🗑 Eliminar Reserva
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
